<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – ANS Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <meta name="robots" content="noindex,nofollow">
</head>
<body>
<div class="admin-login-page">
  <div class="admin-login-card">
    <div class="admin-login-logo">ANS Tools</div>
    <div class="admin-login-subtitle">Admin Panel — Enter your password to continue</div>
    {% if error %}
    <div class="alert alert-error" style="margin-bottom:20px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Enter admin password" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Sign In</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:.8rem;color:var(--text3);">Default password: <code style="background:var(--bg3);padding:2px 6px;border-radius:4px;">anstools2026</code> — Change after first login.</p>
    <p style="text-align:center;margin-top:8px;"><a href="/" style="font-size:.85rem;color:var(--text3);">← Back to website</a></p>
  </div>
</div>
</body>
</html>
